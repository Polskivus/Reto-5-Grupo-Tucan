<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gastro Basque{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="/" class="nav-brand">Gastro Basque</a>
            <div class="nav-links">
                <a href="/recetas" class="nav-link">Recetas</a>
                <a href="/dietas" class="nav-link">Dietas</a>
                <a href="#contacto" class="nav-link">Contacto</a>
            </div>
        </div>
        <div class="dropDown">
            <button class="dropBtn">
                <div class="nav-logo-slot">
                    <img src="{{ url_for('static', filename='img/Gastro_Basque Logo.png') }}" alt="Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">    
                </div>
            </button>
            <div class="contenidoDrop">
                {% if session.get('usuario') %}
                    <a href="/sesion" style="pointer-events: none;">{{ session.get('usuario') }}</a>
                    <a href="CerrarSesion">Cerrar sesion</a>
                {% else %}
                    <a href="/sesion">Iniciar sesion</a>
                    <a href="/CerrarSesion">Cerrar sesion</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="{% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>© 2025 NutriVerde · Recetas y bienestar para tu día a día</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
